# Server
server.port=${PORT:8080}

# Database - Use Railway internal connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/heymatedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:heymate123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:heymate_secret_key_256bits_long}
jwt.expiration=86400000

# Disable Redis and Mail
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Razorpay
razorpay.key_id=${RAZORPAY_KEY_ID:placeholder}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:placeholder}

# Firebase
firebase.credentials.path=classpath:firebase-service-account.json

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.root=WARN
logging.level.com.heymate=INFO

# Frontend
app.frontend.url=${FRONTEND_URL:https://heymateapp-production.up.railway.app}
