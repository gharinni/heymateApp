# Server - bind to 0.0.0.0 for Railway
server.port=${PORT:8080}
server.address=0.0.0.0

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/heymatedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:heymate123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Disable unused
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# JWT
jwt.secret=${JWT_SECRET:heymatesecretkey123456789abcdefghijklmnop}
jwt.expiration=86400000

# Razorpay
razorpay.key_id=${RAZORPAY_KEY_ID:placeholder}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:placeholder}

# Firebase
firebase.credentials.path=classpath:firebase-service-account.json

# Actuator health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.root=WARN
logging.level.com.heymate=INFO

# Frontend
app.frontend.url=${FRONTEND_URL:https://heymateapp-production.up.railway.app}
