# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/heymatedb
spring.datasource.username=postgres
spring.datasource.password=heymate123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────
jwt.secret=heymate_super_secret_key_change_in_production_256bits
jwt.expiration=86400000

# ── Redis ────────────────────────────────────────────────
spring.redis.host=localhost
spring.redis.port=6379

# ── Razorpay ─────────────────────────────────────────────
razorpay.key_id=rzp_test_REPLACE_WITH_YOUR_KEY
razorpay.key_secret=REPLACE_WITH_YOUR_SECRET

# ── Firebase ─────────────────────────────────────────────
firebase.credentials.path=classpath:firebase-service-account.json

# ── Twilio SMS ───────────────────────────────────────────
twilio.account_sid=REPLACE_WITH_TWILIO_SID
twilio.auth_token=REPLACE_WITH_TWILIO_TOKEN
twilio.from_number=+1XXXXXXXXXX

# ── File Upload ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
