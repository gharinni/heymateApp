# ── Server ──────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database ─────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/heymatedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:heymate123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:heymate_super_secret_key_change_in_production_256bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Frontend URL ──────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:https://heymateapp-production.up.railway.app}

# ── Redis (optional) ──────────────────────────────────────
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# ── Razorpay ─────────────────────────────────────────────
razorpay.key_id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:placeholder}

# ── Firebase ─────────────────────────────────────────────
firebase.credentials.path=${FIREBASE_CREDENTIALS:classpath:firebase-service-account.json}

# ── File Upload ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Logging ──────────────────────────────────────────────
logging.level.com.heymate=INFO
logging.level.org.springframework.security=WARN
