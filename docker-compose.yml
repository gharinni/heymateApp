version: '3.8'
services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: heymate-db
    environment:
      POSTGRES_DB: heymatedb
      POSTGRES_PASSWORD: heymate123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: heymate-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
